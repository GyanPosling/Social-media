spring:
  application:
    name: authservice
  datasource:
    url: jdbc:postgresql://localhost:5432/social_media
    username: social
    password: social
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    table: flyway_schema_history_auth
  kafka:
    bootstrap-servers: localhost:9092

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-characters}
    access-token-ttl: 1h

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
