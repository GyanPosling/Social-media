spring:
  application:
    name: postservice
  datasource:
    url: jdbc:postgresql://localhost:5432/social_media
    username: social
    password: social
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
