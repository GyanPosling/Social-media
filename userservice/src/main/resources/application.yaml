spring:
  application:
    name: userservice
  datasource:
    url: jdbc:postgresql://localhost:5432/social_media
    username: social
    password: social
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 10m
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
