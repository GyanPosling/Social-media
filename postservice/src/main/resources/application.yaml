spring:
  application:
    name: postservice
  datasource:
    url: jdbc:postgresql://localhost:5432/social_media
    username: social
    password: social
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    table: flyway_schema_history_post
  kafka:
    bootstrap-servers: localhost:9092

gateway:
  internal-signing-secret: ${GATEWAY_INTERNAL_SIGNING_SECRET:change-this-internal-secret-to-at-least-32-characters}
  signature-max-age-seconds: 300

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
